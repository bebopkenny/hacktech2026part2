services:
  backend:
    build: ./backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - K2_API_KEY=${K2_API_KEY}
      - K2_BASE_URL=${K2_BASE_URL}
      - K2_MODEL=${K2_MODEL}
      - K2_PARALLEL=${K2_PARALLEL:-5}
      - SEMGREP_APP_TOKEN=${SEMGREP_APP_TOKEN}
      - BACKBOARD_API_KEY=${BACKBOARD_API_KEY:-}
      - BACKBOARD_MODEL=${BACKBOARD_MODEL:-gpt-4o-mini}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - PUBLIC_WEBHOOK_URL=${PUBLIC_WEBHOOK_URL:-}
    volumes:
      - /tmp/sentinelai:/tmp/sentinelai  # cloned repos, cleaned up after each scan
    restart: unless-stopped

  # Caddy auto-provisions a Let's Encrypt cert for $DOMAIN.
  # Skip this service entirely (or omit DOMAIN) if you're fine with plain HTTP on :8000.
  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
