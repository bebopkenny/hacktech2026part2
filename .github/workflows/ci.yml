name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Import smoke test
        env:
          K2_API_KEY: dummy-for-import
        run: python -c "import main; assert main.app.title == 'SentinelAI'"

  docker:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t sentinelai-backend:ci ./backend
