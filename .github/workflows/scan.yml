# Trigger a SentinelAI scan on push (or manually via workflow_dispatch).
# Can also be triggered by the /webhook/github endpoint directly from GitHub.
#
# TODO: decide whether Actions is the trigger layer or just for CI
# Option A: Actions POSTs to the Vultr backend → backend does the work
# Option B: Actions runs semgrep itself, posts findings to backend for AI triage

name: SentinelAI Scan

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: "GitHub repo URL to scan"
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scan
        run: |
          # TODO: POST to Vultr backend
          # curl -X POST ${{ secrets.SENTINELAI_URL }}/scan \
          #   -H "Content-Type: application/json" \
          #   -d '{"url": "${{ github.event.inputs.target_url }}"}'
        env:
          SENTINELAI_URL: ${{ secrets.SENTINELAI_URL }}
